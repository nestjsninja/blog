name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    env:
      NEXT_PUBLIC_SITE_URL: https://nestjs-ninja.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate baseline coverage
        if: github.event_name == 'pull_request'
        run: |
          git worktree add --detach .baseline ${{ github.event.pull_request.base.sha }}
          npm ci --prefix .baseline
          node scripts/coverage-report.mjs --cwd .baseline --json .coverage/baseline.json

      - name: Generate push baseline coverage
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: |
          git worktree add --detach .baseline ${{ github.event.before }}
          npm ci --prefix .baseline
          node scripts/coverage-report.mjs --cwd .baseline --json .coverage/baseline.json

      - name: Remove baseline worktree
        if: always() && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'))
        run: git worktree remove --force .baseline

      - name: Run quality gate
        env:
          QUALITY_GATE_EXPECT_BASELINE: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000') }}
        run: npm run quality:gate
