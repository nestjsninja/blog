name: Contribute code
description: Propose an improvement to the blog app, tooling, automation, or reader experience before opening a pull request.
title: "Code contribution: "
labels: ["community", "enhancement", "code-contribution"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to propose a focused code contribution. Small changes with a clear goal are easier to review and merge.

  - type: input
    id: area
    attributes:
      label: Area of the project
      description: Which part of the blog or workflow are you improving?
      placeholder: Markdown rendering, generated covers, community page, CI, or SEO
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you solving?
      description: Describe the current limitation or bug.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Outline the implementation you want to send.
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: How will you verify it?
      description: Mention tests, lint, build, visual checks, or Cloudflare output when relevant.
      placeholder: npm run lint, npm test, npm run build, npx @cloudflare/next-on-pages@1
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission checklist
      options:
        - label: I intend to keep the change focused on one clear goal.
          required: true
        - label: I will run the relevant checks before opening a pull request.
          required: false
